<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" width="860" height="500" font-family="system-ui, -apple-system, sans-serif">
  <!-- Fondo principal -->
  <rect width="860" height="500" fill="#0f172a" rx="12"/>

  <!-- Título -->
  <text x="430" y="42" text-anchor="middle" font-size="20" font-weight="700" fill="#f1f5f9">Análisis de Valores Límite (BVA)</text>
  <text x="430" y="64" text-anchor="middle" font-size="13" fill="#94a3b8">Campo "Edad" — acepta valores entre 18 y 65</text>

  <!-- ════ LÍNEA PRINCIPAL ════ -->
  <line x1="60" y1="170" x2="800" y2="170" stroke="#334155" stroke-width="2"/>
  <polygon points="50,170 66,164 66,176" fill="#334155"/>
  <polygon points="810,170 794,164 794,176" fill="#334155"/>

  <!-- Zonas de color sobre la línea -->
  <!-- Zona inválida izquierda -->
  <rect x="62" y="162" width="200" height="16" fill="#ef4444" opacity="0.25"/>
  <!-- Zona válida -->
  <rect x="262" y="162" width="336" height="16" fill="#22c55e" opacity="0.22"/>
  <!-- Zona inválida derecha -->
  <rect x="598" y="162" width="200" height="16" fill="#ef4444" opacity="0.25"/>

  <!-- Marcadores de límite -->
  <line x1="262" y1="156" x2="262" y2="184" stroke="#f1f5f9" stroke-width="2"/>
  <line x1="598" y1="156" x2="598" y2="184" stroke="#f1f5f9" stroke-width="2"/>
  <text x="262" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">18</text>
  <text x="598" y="200" text-anchor="middle" font-size="14" font-weight="700" fill="#f1f5f9">65</text>

  <!-- Etiquetas de zona -->
  <text x="160" y="152" text-anchor="middle" font-size="11" fill="#ef4444">Inválido</text>
  <text x="430" y="152" text-anchor="middle" font-size="11" fill="#22c55e">Válido</text>
  <text x="700" y="152" text-anchor="middle" font-size="11" fill="#ef4444">Inválido</text>

  <!-- ════ PUNTOS BVA — LÍMITE INFERIOR (18) ════ -->
  <!-- Valor 17 — off point izq -->
  <circle cx="215" cy="170" r="9" fill="#ef4444" stroke="#0f172a" stroke-width="2"/>
  <text x="215" y="225" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">17</text>
  <text x="215" y="242" text-anchor="middle" font-size="10" fill="#94a3b8">off point</text>
  <text x="215" y="256" text-anchor="middle" font-size="10" fill="#ef4444">Rechazado</text>
  <line x1="215" y1="179" x2="215" y2="215" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Valor 18 — on point -->
  <circle cx="262" cy="170" r="9" fill="#6366f1" stroke="#0f172a" stroke-width="2"/>
  <text x="262" y="225" text-anchor="middle" font-size="14" font-weight="700" fill="#6366f1">18</text>
  <text x="262" y="242" text-anchor="middle" font-size="10" fill="#94a3b8">on point</text>
  <text x="262" y="256" text-anchor="middle" font-size="10" fill="#22c55e">Aceptado</text>
  <line x1="262" y1="179" x2="262" y2="215" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Valor 19 — off point der -->
  <circle cx="309" cy="170" r="9" fill="#22c55e" stroke="#0f172a" stroke-width="2"/>
  <text x="309" y="225" text-anchor="middle" font-size="14" font-weight="700" fill="#22c55e">19</text>
  <text x="309" y="242" text-anchor="middle" font-size="10" fill="#94a3b8">off point</text>
  <text x="309" y="256" text-anchor="middle" font-size="10" fill="#22c55e">Aceptado</text>
  <line x1="309" y1="179" x2="309" y2="215" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- ════ PUNTOS BVA — LÍMITE SUPERIOR (65) ════ -->
  <!-- Valor 64 — off point izq -->
  <circle cx="551" cy="170" r="9" fill="#22c55e" stroke="#0f172a" stroke-width="2"/>
  <text x="551" y="225" text-anchor="middle" font-size="14" font-weight="700" fill="#22c55e">64</text>
  <text x="551" y="242" text-anchor="middle" font-size="10" fill="#94a3b8">off point</text>
  <text x="551" y="256" text-anchor="middle" font-size="10" fill="#22c55e">Aceptado</text>
  <line x1="551" y1="179" x2="551" y2="215" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Valor 65 — on point -->
  <circle cx="598" cy="170" r="9" fill="#6366f1" stroke="#0f172a" stroke-width="2"/>
  <text x="598" y="225" text-anchor="middle" font-size="14" font-weight="700" fill="#6366f1">65</text>
  <text x="598" y="242" text-anchor="middle" font-size="10" fill="#94a3b8">on point</text>
  <text x="598" y="256" text-anchor="middle" font-size="10" fill="#22c55e">Aceptado</text>
  <line x1="598" y1="179" x2="598" y2="215" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Valor 66 — off point der -->
  <circle cx="645" cy="170" r="9" fill="#ef4444" stroke="#0f172a" stroke-width="2"/>
  <text x="645" y="225" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">66</text>
  <text x="645" y="242" text-anchor="middle" font-size="10" fill="#94a3b8">off point</text>
  <text x="645" y="256" text-anchor="middle" font-size="10" fill="#ef4444">Rechazado</text>
  <line x1="645" y1="179" x2="645" y2="215" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- ════ VALOR INTERIOR (valor de partición dentro) ════ -->
  <circle cx="430" cy="170" r="7" fill="#334155" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="430" y="225" text-anchor="middle" font-size="13" fill="#64748b">35</text>
  <text x="430" y="242" text-anchor="middle" font-size="10" fill="#64748b">interior</text>
  <text x="430" y="256" text-anchor="middle" font-size="10" fill="#22c55e">Aceptado</text>

  <!-- ════ LEYENDA ════ -->
  <rect x="60" y="290" width="740" height="38" rx="6" fill="#1e293b"/>
  <circle cx="105" cy="309" r="7" fill="#6366f1"/>
  <text x="120" y="314" font-size="12" fill="#f1f5f9">On point (en el límite exacto)</text>
  <circle cx="330" cy="309" r="7" fill="#22c55e"/>
  <text x="345" y="314" font-size="12" fill="#f1f5f9">Off point válido (dentro del rango)</text>
  <circle cx="570" cy="309" r="7" fill="#ef4444"/>
  <text x="585" y="314" font-size="12" fill="#f1f5f9">Off point inválido (fuera del rango)</text>

  <!-- ════ TABLA RESUMEN ════ -->
  <rect x="60" y="348" width="740" height="32" rx="6" fill="#1e293b"/>
  <text x="100" y="369" font-size="12" font-weight="700" fill="#94a3b8">Valor</text>
  <text x="200" y="369" font-size="12" font-weight="700" fill="#94a3b8">Posición</text>
  <text x="400" y="369" font-size="12" font-weight="700" fill="#94a3b8">Límite</text>
  <text x="600" y="369" font-size="12" font-weight="700" fill="#94a3b8">Resultado</text>

  <rect x="60" y="380" width="740" height="24" fill="#1c1f2e"/>
  <text x="100" y="397" font-size="12" fill="#ef4444">17</text>
  <text x="200" y="397" font-size="12" fill="#f1f5f9">Justo por debajo del mínimo</text>
  <text x="400" y="397" font-size="12" fill="#f1f5f9">18</text>
  <text x="600" y="397" font-size="12" fill="#ef4444">Rechazado</text>

  <rect x="60" y="404" width="740" height="24" fill="#1e293b"/>
  <text x="100" y="421" font-size="12" fill="#6366f1">18</text>
  <text x="200" y="421" font-size="12" fill="#f1f5f9">En el límite mínimo</text>
  <text x="400" y="421" font-size="12" fill="#f1f5f9">18</text>
  <text x="600" y="421" font-size="12" fill="#22c55e">Aceptado</text>

  <rect x="60" y="428" width="740" height="24" fill="#1c1f2e"/>
  <text x="100" y="445" font-size="12" fill="#22c55e">64</text>
  <text x="200" y="445" font-size="12" fill="#f1f5f9">Justo por debajo del máximo</text>
  <text x="400" y="445" font-size="12" fill="#f1f5f9">65</text>
  <text x="600" y="445" font-size="12" fill="#22c55e">Aceptado</text>

  <rect x="60" y="452" width="740" height="24" fill="#1e293b"/>
  <text x="100" y="469" font-size="12" fill="#6366f1">65</text>
  <text x="200" y="469" font-size="12" fill="#f1f5f9">En el límite máximo</text>
  <text x="400" y="469" font-size="12" fill="#f1f5f9">65</text>
  <text x="600" y="469" font-size="12" fill="#22c55e">Aceptado</text>

  <!-- Badge etapa -->
  <rect x="700" y="476" width="150" height="20" rx="10" fill="#1e293b"/>
  <text x="775" y="490" text-anchor="middle" font-size="11" fill="#6366f1">Etapa 0 · Semana 02</text>
</svg>
