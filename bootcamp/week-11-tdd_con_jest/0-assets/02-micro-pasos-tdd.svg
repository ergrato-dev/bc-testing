<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Micro pasos TDD</title>
  <desc id="desc">Linea de tiempo con micro pasos de TDD desde caso simple hasta refactor incremental.</desc>
  <rect width="1200" height="700" fill="#0f172a"/>
  <text x="70" y="90" fill="#f1f5f9" font-size="34" font-family="Inter, Roboto, sans-serif" font-weight="700">Micro-pasos TDD para reducir riesgo</text>

  <rect x="60" y="130" width="1080" height="500" rx="18" fill="#1e293b" stroke="#334155" stroke-width="2"/>

  <line x1="140" y1="380" x2="1060" y2="380" stroke="#475569" stroke-width="4"/>

  <circle cx="180" cy="380" r="18" fill="#ef4444"/>
  <text x="140" y="330" fill="#ef4444" font-size="18" font-family="Inter, Roboto, sans-serif" font-weight="700">1. Red</text>
  <text x="110" y="420" fill="#cbd5e1" font-size="14" font-family="Inter, Roboto, sans-serif">Test nuevo falla</text>

  <circle cx="360" cy="380" r="18" fill="#22c55e"/>
  <text x="310" y="330" fill="#22c55e" font-size="18" font-family="Inter, Roboto, sans-serif" font-weight="700">2. Green</text>
  <text x="290" y="420" fill="#cbd5e1" font-size="14" font-family="Inter, Roboto, sans-serif">Minimo codigo</text>

  <circle cx="540" cy="380" r="18" fill="#6366f1"/>
  <text x="465" y="330" fill="#6366f1" font-size="18" font-family="Inter, Roboto, sans-serif" font-weight="700">3. Refactor</text>
  <text x="452" y="420" fill="#cbd5e1" font-size="14" font-family="Inter, Roboto, sans-serif">Limpia duplicacion</text>

  <circle cx="720" cy="380" r="18" fill="#ef4444"/>
  <text x="655" y="330" fill="#ef4444" font-size="18" font-family="Inter, Roboto, sans-serif" font-weight="700">4. Nuevo Red</text>
  <text x="630" y="420" fill="#cbd5e1" font-size="14" font-family="Inter, Roboto, sans-serif">Agrega borde</text>

  <circle cx="900" cy="380" r="18" fill="#22c55e"/>
  <text x="845" y="330" fill="#22c55e" font-size="18" font-family="Inter, Roboto, sans-serif" font-weight="700">5. Green</text>
  <text x="828" y="420" fill="#cbd5e1" font-size="14" font-family="Inter, Roboto, sans-serif">Generaliza regla</text>

  <text x="100" y="540" fill="#94a3b8" font-size="16" font-family="Inter, Roboto, sans-serif">La clave: cambios pequenos + ejecucion frecuente de tests + aprendizaje continuo del diseno.</text>
</svg>
