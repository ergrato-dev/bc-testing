<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Refactor safety net</title>
  <desc id="desc">Visualizacion de la suite de tests como red de seguridad durante refactor incremental.</desc>
  <rect width="1200" height="700" fill="#0f172a"/>
  <text x="70" y="90" fill="#f1f5f9" font-size="34" font-family="Inter, Roboto, sans-serif" font-weight="700">Refactor seguro: la suite como red de proteccion</text>

  <rect x="80" y="130" width="1040" height="500" rx="18" fill="#1e293b" stroke="#334155" stroke-width="2"/>

  <rect x="130" y="200" width="300" height="130" rx="12" fill="#0b1220" stroke="#22c55e" stroke-width="2"/>
  <text x="180" y="245" fill="#22c55e" font-size="22" font-family="Inter, Roboto, sans-serif" font-weight="700">Suite en verde</text>
  <text x="160" y="275" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">Base estable antes de tocar diseno.</text>

  <rect x="470" y="200" width="300" height="130" rx="12" fill="#0b1220" stroke="#6366f1" stroke-width="2"/>
  <text x="515" y="245" fill="#6366f1" font-size="22" font-family="Inter, Roboto, sans-serif" font-weight="700">Paso pequeno</text>
  <text x="495" y="275" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">Extrae, renombra o simplifica.</text>

  <rect x="810" y="200" width="260" height="130" rx="12" fill="#0b1220" stroke="#f7df1e" stroke-width="2"/>
  <text x="865" y="245" fill="#f7df1e" font-size="22" font-family="Inter, Roboto, sans-serif" font-weight="700">Re-ejecuta</text>
  <text x="830" y="275" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">Si falla, rollback local.</text>

  <rect x="210" y="390" width="760" height="180" rx="14" fill="#0b1220" stroke="#475569" stroke-width="2"/>
  <text x="250" y="435" fill="#94a3b8" font-size="18" font-family="Inter, Roboto, sans-serif">Senales de alarma durante refactor:</text>
  <text x="250" y="470" fill="#ef4444" font-size="16" font-family="Inter, Roboto, sans-serif">- Multiples tests rotos por un cambio pequeno</text>
  <text x="250" y="500" fill="#ef4444" font-size="16" font-family="Inter, Roboto, sans-serif">- Necesidad de tocar demasiadas capas a la vez</text>
  <text x="250" y="530" fill="#ef4444" font-size="16" font-family="Inter, Roboto, sans-serif">- Duda sobre comportamiento esperado (faltan tests)</text>

  <path d="M430 265 L470 265" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M770 265 L810 265" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
