<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#0f172a"/>
  <text x="600" y="70" fill="#f1f5f9" font-size="34" text-anchor="middle" font-family="Inter, Arial, sans-serif">Validacion de Rejects en Jest</text>

  <rect x="170" y="170" width="360" height="200" rx="12" fill="#1e293b" stroke="#F7DF1E"/>
  <text x="350" y="235" fill="#F7DF1E" font-size="24" text-anchor="middle" font-family="Inter, Arial, sans-serif">Promise Rejected</text>
  <text x="350" y="275" fill="#94a3b8" font-size="16" text-anchor="middle" font-family="Inter, Arial, sans-serif">Error: ValidationError</text>

  <rect x="670" y="170" width="360" height="200" rx="12" fill="#1e293b" stroke="#22c55e"/>
  <text x="850" y="235" fill="#22c55e" font-size="24" text-anchor="middle" font-family="Inter, Arial, sans-serif">await expect(...).rejects</text>
  <text x="850" y="275" fill="#94a3b8" font-size="16" text-anchor="middle" font-family="Inter, Arial, sans-serif">toThrow('ValidationError')</text>

  <line x1="530" y1="270" x2="670" y2="270" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
</svg>
