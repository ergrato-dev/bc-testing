<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 480" width="920" height="480" font-family="system-ui, -apple-system, sans-serif">
  <rect width="920" height="480" fill="#0f172a" rx="12"/>
  <text x="460" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#f1f5f9">Patron AAA en JUnit 5</text>
  <text x="460" y="64" text-anchor="middle" font-size="13" fill="#94a3b8">Arrange · Act · Assert</text>

  <rect x="70" y="100" width="245" height="280" rx="12" fill="#1e293b" stroke="#F89820" stroke-width="2"/>
  <text x="192" y="132" text-anchor="middle" font-size="18" font-weight="700" fill="#F89820">Arrange</text>
  <text x="92" y="160" font-size="12" fill="#e2e8f0">Preparar datos y contexto</text>
  <text x="92" y="184" font-size="12" fill="#cbd5e1">- Inputs y estado inicial</text>
  <rect x="92" y="246" width="200" height="110" rx="8" fill="#111827"/>
  <text x="104" y="270" font-size="11" fill="#94a3b8">double price = 100;</text>
  <text x="104" y="288" font-size="11" fill="#94a3b8">int percent = 20;</text>

  <rect x="338" y="100" width="245" height="280" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="460" y="132" text-anchor="middle" font-size="18" font-weight="700" fill="#6366f1">Act</text>
  <text x="360" y="160" font-size="12" fill="#e2e8f0">Ejecutar accion</text>
  <rect x="360" y="246" width="200" height="110" rx="8" fill="#111827"/>
  <text x="372" y="270" font-size="11" fill="#94a3b8">double result =</text>
  <text x="372" y="288" font-size="11" fill="#94a3b8">service.calculate(price, percent);</text>

  <rect x="606" y="100" width="245" height="280" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="728" y="132" text-anchor="middle" font-size="18" font-weight="700" fill="#22c55e">Assert</text>
  <text x="628" y="160" font-size="12" fill="#e2e8f0">Verificar resultado</text>
  <rect x="628" y="246" width="200" height="110" rx="8" fill="#111827"/>
  <text x="640" y="270" font-size="11" fill="#94a3b8">assertEquals(80, result);</text>

  <line x1="315" y1="240" x2="338" y2="240" stroke="#475569" stroke-width="2"/>
  <polygon points="338,240 328,234 328,246" fill="#475569"/>
  <line x1="583" y1="240" x2="606" y2="240" stroke="#475569" stroke-width="2"/>
  <polygon points="606,240 596,234 596,246" fill="#475569"/>

  <rect x="80" y="400" width="760" height="54" rx="8" fill="#111827" stroke="#334155"/>
  <text x="96" y="422" font-size="12" fill="#94a3b8">@Test @DisplayName("should return 80 when price is 100 and percent is 20")</text>
  <text x="96" y="440" font-size="12" fill="#cbd5e1">void shouldReturn80WhenPriceIs100AndPercentIs20() { ... }</text>
</svg>
