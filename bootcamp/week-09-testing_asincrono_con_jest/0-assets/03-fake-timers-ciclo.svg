<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#0f172a"/>
  <text x="600" y="70" fill="#f1f5f9" font-size="34" text-anchor="middle" font-family="Inter, Arial, sans-serif">Ciclo de Fake Timers en Jest</text>

  <circle cx="250" cy="350" r="95" fill="#1e293b" stroke="#6366f1" stroke-width="3"/>
  <text x="250" y="355" fill="#f1f5f9" font-size="20" text-anchor="middle" font-family="Inter, Arial, sans-serif">useFakeTimers</text>

  <circle cx="600" cy="200" r="95" fill="#1e293b" stroke="#F7DF1E" stroke-width="3"/>
  <text x="600" y="205" fill="#F7DF1E" font-size="20" text-anchor="middle" font-family="Inter, Arial, sans-serif">schedule action</text>

  <circle cx="950" cy="350" r="95" fill="#1e293b" stroke="#22c55e" stroke-width="3"/>
  <text x="950" y="355" fill="#22c55e" font-size="20" text-anchor="middle" font-family="Inter, Arial, sans-serif">advanceTimers</text>

  <circle cx="600" cy="520" r="95" fill="#1e293b" stroke="#ef4444" stroke-width="3"/>
  <text x="600" y="525" fill="#ef4444" font-size="20" text-anchor="middle" font-family="Inter, Arial, sans-serif">useRealTimers</text>

  <line x1="330" y1="310" x2="520" y2="240" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="680" y1="240" x2="870" y2="310" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="900" y1="430" x2="680" y2="490" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="520" y1="490" x2="330" y2="430" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
</svg>
