<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mapa de decision para manejo de errores HTTP</title>
  <desc id="desc">Arbol para decidir status y respuesta de error segun tipo de falla en API REST.</desc>
  <rect width="1200" height="700" fill="#0f172a"/>
  <text x="70" y="88" fill="#f1f5f9" font-size="34" font-family="Inter, Roboto, sans-serif" font-weight="700">Mapa de decision: que status devolver?</text>

  <rect x="470" y="120" width="280" height="90" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="495" y="170" fill="#6366f1" font-size="22" font-family="Inter, Roboto, sans-serif" font-weight="700">Error detectado</text>

  <rect x="130" y="290" width="260" height="110" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="170" y="338" fill="#ef4444" font-size="22" font-family="Inter, Roboto, sans-serif" font-weight="700">Validacion</text>
  <text x="185" y="365" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">-> 400</text>

  <rect x="470" y="290" width="260" height="110" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="500" y="338" fill="#f59e0b" font-size="22" font-family="Inter, Roboto, sans-serif" font-weight="700">No encontrado</text>
  <text x="525" y="365" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">-> 404</text>

  <rect x="810" y="290" width="260" height="110" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="860" y="338" fill="#22c55e" font-size="22" font-family="Inter, Roboto, sans-serif" font-weight="700">Conflicto</text>
  <text x="865" y="365" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">-> 409</text>

  <rect x="470" y="500" width="260" height="110" rx="12" fill="#1e293b" stroke="#f43f5e" stroke-width="2"/>
  <text x="520" y="548" fill="#f43f5e" font-size="22" font-family="Inter, Roboto, sans-serif" font-weight="700">Inesperado</text>
  <text x="525" y="575" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">-> 500</text>

  <path d="M610 210 L260 290" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M610 210 L600 290" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M610 210 L940 290" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M600 400 L600 500" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>

  <rect x="80" y="620" width="1040" height="48" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="110" y="650" fill="#94a3b8" font-size="16" font-family="Inter, Roboto, sans-serif">Estandariza payload: { error: string, message: string } en todos los caminos de error.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
