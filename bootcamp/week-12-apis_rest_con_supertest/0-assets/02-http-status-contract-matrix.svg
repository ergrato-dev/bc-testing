<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Matriz de status y contrato HTTP</title>
  <desc id="desc">Tabla visual para mapear endpoint, escenario, status esperado y contrato JSON.</desc>
  <rect width="1200" height="700" fill="#0f172a"/>
  <text x="70" y="90" fill="#f1f5f9" font-size="34" font-family="Inter, Roboto, sans-serif" font-weight="700">Matriz de status + contrato para API tests</text>

  <rect x="70" y="130" width="1060" height="500" rx="16" fill="#1e293b" stroke="#334155" stroke-width="2"/>

  <rect x="100" y="170" width="220" height="50" fill="#0b1220" stroke="#475569" stroke-width="1"/>
  <rect x="320" y="170" width="340" height="50" fill="#0b1220" stroke="#475569" stroke-width="1"/>
  <rect x="660" y="170" width="150" height="50" fill="#0b1220" stroke="#475569" stroke-width="1"/>
  <rect x="810" y="170" width="290" height="50" fill="#0b1220" stroke="#475569" stroke-width="1"/>

  <text x="130" y="202" fill="#94a3b8" font-size="16" font-family="Inter, Roboto, sans-serif" font-weight="700">Endpoint</text>
  <text x="450" y="202" fill="#94a3b8" font-size="16" font-family="Inter, Roboto, sans-serif" font-weight="700">Escenario</text>
  <text x="700" y="202" fill="#94a3b8" font-size="16" font-family="Inter, Roboto, sans-serif" font-weight="700">Status</text>
  <text x="900" y="202" fill="#94a3b8" font-size="16" font-family="Inter, Roboto, sans-serif" font-weight="700">Contrato JSON</text>

  <rect x="100" y="220" width="220" height="70" fill="#111827" stroke="#475569" stroke-width="1"/>
  <rect x="320" y="220" width="340" height="70" fill="#111827" stroke="#475569" stroke-width="1"/>
  <rect x="660" y="220" width="150" height="70" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <rect x="810" y="220" width="290" height="70" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="125" y="262" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">GET /items</text>
  <text x="350" y="262" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">Lista disponible</text>
  <text x="715" y="262" fill="#22c55e" font-size="18" font-family="Inter, Roboto, sans-serif" font-weight="700">200</text>
  <text x="835" y="262" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">{ items: [] }</text>

  <rect x="100" y="290" width="220" height="70" fill="#111827" stroke="#475569" stroke-width="1"/>
  <rect x="320" y="290" width="340" height="70" fill="#111827" stroke="#475569" stroke-width="1"/>
  <rect x="660" y="290" width="150" height="70" fill="#052e16" stroke="#22c55e" stroke-width="1"/>
  <rect x="810" y="290" width="290" height="70" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="122" y="332" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">POST /items</text>
  <text x="350" y="332" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">Payload valido</text>
  <text x="715" y="332" fill="#22c55e" font-size="18" font-family="Inter, Roboto, sans-serif" font-weight="700">201</text>
  <text x="835" y="332" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">{ id, name }</text>

  <rect x="100" y="360" width="220" height="70" fill="#111827" stroke="#475569" stroke-width="1"/>
  <rect x="320" y="360" width="340" height="70" fill="#111827" stroke="#475569" stroke-width="1"/>
  <rect x="660" y="360" width="150" height="70" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <rect x="810" y="360" width="290" height="70" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="122" y="402" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">POST /items</text>
  <text x="350" y="402" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">name faltante</text>
  <text x="715" y="402" fill="#ef4444" font-size="18" font-family="Inter, Roboto, sans-serif" font-weight="700">400</text>
  <text x="835" y="402" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">{ error, message }</text>

  <rect x="100" y="430" width="220" height="70" fill="#111827" stroke="#475569" stroke-width="1"/>
  <rect x="320" y="430" width="340" height="70" fill="#111827" stroke="#475569" stroke-width="1"/>
  <rect x="660" y="430" width="150" height="70" fill="#450a0a" stroke="#ef4444" stroke-width="1"/>
  <rect x="810" y="430" width="290" height="70" fill="#111827" stroke="#475569" stroke-width="1"/>
  <text x="110" y="472" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">GET /items/:id</text>
  <text x="350" y="472" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">Recurso no existe</text>
  <text x="715" y="472" fill="#ef4444" font-size="18" font-family="Inter, Roboto, sans-serif" font-weight="700">404</text>
  <text x="835" y="472" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">{ error, message }</text>

  <text x="100" y="565" fill="#94a3b8" font-size="16" font-family="Inter, Roboto, sans-serif">Regla: cada status debe tener un contrato JSON verificable, no solo una expectativa numerica.</text>
</svg>
