<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Flujo de request con Supertest</title>
  <desc id="desc">Diagrama de flujo entre test, app express, capa de servicio y respuesta HTTP.</desc>
  <rect width="1200" height="700" fill="#0f172a"/>
  <text x="70" y="88" fill="#f1f5f9" font-size="34" font-family="Inter, Roboto, sans-serif" font-weight="700">Flujo de una prueba de endpoint con Supertest</text>

  <rect x="80" y="150" width="220" height="120" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="125" y="200" fill="#6366f1" font-size="22" font-family="Inter, Roboto, sans-serif" font-weight="700">Test</text>
  <text x="104" y="228" fill="#cbd5e1" font-size="14" font-family="Inter, Roboto, sans-serif">request(app).post(...)</text>

  <rect x="360" y="150" width="220" height="120" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="420" y="200" fill="#22c55e" font-size="22" font-family="Inter, Roboto, sans-serif" font-weight="700">Express</text>
  <text x="392" y="228" fill="#cbd5e1" font-size="14" font-family="Inter, Roboto, sans-serif">Routing + middleware</text>

  <rect x="640" y="150" width="220" height="120" rx="12" fill="#1e293b" stroke="#f7df1e" stroke-width="2"/>
  <text x="700" y="200" fill="#f7df1e" font-size="22" font-family="Inter, Roboto, sans-serif" font-weight="700">Service</text>
  <text x="668" y="228" fill="#cbd5e1" font-size="14" font-family="Inter, Roboto, sans-serif">Reglas de negocio</text>

  <rect x="920" y="150" width="200" height="120" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="962" y="200" fill="#ef4444" font-size="22" font-family="Inter, Roboto, sans-serif" font-weight="700">HTTP</text>
  <text x="942" y="228" fill="#cbd5e1" font-size="14" font-family="Inter, Roboto, sans-serif">status + body</text>

  <path d="M300 210 L360 210" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M580 210 L640 210" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M860 210 L920 210" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>

  <rect x="140" y="360" width="920" height="220" rx="14" fill="#1e293b" stroke="#334155" stroke-width="2"/>
  <text x="180" y="410" fill="#94a3b8" font-size="18" font-family="Inter, Roboto, sans-serif">Aserciones recomendadas por cada request</text>
  <text x="180" y="450" fill="#cbd5e1" font-size="16" font-family="Inter, Roboto, sans-serif">1) Codigo de estado correcto</text>
  <text x="180" y="480" fill="#cbd5e1" font-size="16" font-family="Inter, Roboto, sans-serif">2) Estructura exacta del JSON</text>
  <text x="180" y="510" fill="#cbd5e1" font-size="16" font-family="Inter, Roboto, sans-serif">3) Mensaje de error consistente en escenarios negativos</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
