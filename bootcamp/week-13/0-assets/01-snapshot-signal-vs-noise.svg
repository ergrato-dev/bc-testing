<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Snapshot signal versus noise</title>
  <desc id="desc">Comparativa entre snapshot útil y snapshot ruidoso para decisiones de testing.</desc>
  <rect width="1200" height="700" fill="#0f172a"/>
  <text x="70" y="86" fill="#f1f5f9" font-size="34" font-family="Inter, Roboto, sans-serif" font-weight="700">Snapshot testing: señal vs ruido</text>

  <rect x="70" y="130" width="510" height="500" rx="16" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="105" y="180" fill="#22c55e" font-size="28" font-family="Inter, Roboto, sans-serif" font-weight="700">Señal</text>
  <text x="105" y="220" fill="#cbd5e1" font-size="16" font-family="Inter, Roboto, sans-serif">- Payload estable y relevante</text>
  <text x="105" y="250" fill="#cbd5e1" font-size="16" font-family="Inter, Roboto, sans-serif">- Cambios significativos de contrato</text>
  <text x="105" y="280" fill="#cbd5e1" font-size="16" font-family="Inter, Roboto, sans-serif">- Tamaño manejable para revisión</text>

  <rect x="100" y="320" width="450" height="250" rx="12" fill="#0b1220" stroke="#334155" stroke-width="1"/>
  <text x="125" y="355" fill="#fbbf24" font-size="14" font-family="monospace">{</text>
  <text x="145" y="380" fill="#fbbf24" font-size="14" font-family="monospace">"id": "u-10",</text>
  <text x="145" y="405" fill="#fbbf24" font-size="14" font-family="monospace">"displayName": "Ada",</text>
  <text x="145" y="430" fill="#fbbf24" font-size="14" font-family="monospace">"role": "mentor",</text>
  <text x="145" y="455" fill="#fbbf24" font-size="14" font-family="monospace">"permissions": ["read", "write"]</text>
  <text x="125" y="480" fill="#fbbf24" font-size="14" font-family="monospace">}</text>

  <rect x="620" y="130" width="510" height="500" rx="16" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="655" y="180" fill="#ef4444" font-size="28" font-family="Inter, Roboto, sans-serif" font-weight="700">Ruido</text>
  <text x="655" y="220" fill="#cbd5e1" font-size="16" font-family="Inter, Roboto, sans-serif">- Datos volátiles sin normalizar</text>
  <text x="655" y="250" fill="#cbd5e1" font-size="16" font-family="Inter, Roboto, sans-serif">- Snapshot enorme y difícil de revisar</text>
  <text x="655" y="280" fill="#cbd5e1" font-size="16" font-family="Inter, Roboto, sans-serif">- Falsos cambios por timestamps y random</text>

  <rect x="650" y="320" width="450" height="250" rx="12" fill="#0b1220" stroke="#334155" stroke-width="1"/>
  <text x="675" y="355" fill="#fbbf24" font-size="14" font-family="monospace">{ ... 2000 lines ... }</text>
  <text x="675" y="385" fill="#fbbf24" font-size="14" font-family="monospace">"createdAt": "2026-03-20T...",</text>
  <text x="675" y="410" fill="#fbbf24" font-size="14" font-family="monospace">"traceId": "8f4e...",</text>
  <text x="675" y="435" fill="#fbbf24" font-size="14" font-family="monospace">"nonce": 7421991,</text>
  <text x="675" y="460" fill="#fbbf24" font-size="14" font-family="monospace">... diff constante sin valor ...</text>

  <text x="70" y="670" fill="#94a3b8" font-size="16" font-family="Inter, Roboto, sans-serif">Regla: snapshot solo cuando mejora la revisión de cambios de contrato.</text>
</svg>
