<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Loop de property based testing</title>
  <desc id="desc">Ciclo de generación de datos, validación de propiedad y shrinking de contraejemplos.</desc>
  <rect width="1200" height="700" fill="#0f172a"/>
  <text x="70" y="88" fill="#f1f5f9" font-size="34" font-family="Inter, Roboto, sans-serif" font-weight="700">Loop de property-based testing con fast-check</text>

  <circle cx="600" cy="380" r="210" fill="none" stroke="#334155" stroke-width="16"/>

  <rect x="500" y="145" width="200" height="80" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="540" y="192" fill="#6366f1" font-size="20" font-family="Inter, Roboto, sans-serif" font-weight="700">Generate</text>

  <rect x="805" y="330" width="230" height="80" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="875" y="377" fill="#22c55e" font-size="20" font-family="Inter, Roboto, sans-serif" font-weight="700">Assert</text>

  <rect x="505" y="530" width="190" height="80" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="548" y="577" fill="#ef4444" font-size="20" font-family="Inter, Roboto, sans-serif" font-weight="700">Shrink</text>

  <rect x="170" y="330" width="230" height="80" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="230" y="377" fill="#f59e0b" font-size="20" font-family="Inter, Roboto, sans-serif" font-weight="700">Counterexample</text>

  <path d="M700 185 L850 330" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M805 410 L650 530" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M505 570 L400 410" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M400 330 L520 210" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>

  <rect x="60" y="620" width="1080" height="48" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="88" y="651" fill="#94a3b8" font-size="16" font-family="Inter, Roboto, sans-serif">Cuando falla, fast-check intenta reducir el caso al ejemplo mínimo que rompe la propiedad.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
