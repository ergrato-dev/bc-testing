<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Arbol de decision para siguiente test</title>
  <desc id="desc">Decision tree para seleccionar el proximo test en TDD de manera incremental.</desc>
  <rect width="1200" height="700" fill="#0f172a"/>
  <text x="70" y="90" fill="#f1f5f9" font-size="34" font-family="Inter, Roboto, sans-serif" font-weight="700">Como elegir el siguiente test en TDD</text>

  <rect x="430" y="130" width="340" height="90" rx="12" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="472" y="170" fill="#6366f1" font-size="24" font-family="Inter, Roboto, sans-serif" font-weight="700">Suite en verde?</text>

  <rect x="170" y="300" width="340" height="90" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="220" y="340" fill="#ef4444" font-size="22" font-family="Inter, Roboto, sans-serif" font-weight="700">No: corrige primero</text>

  <rect x="690" y="300" width="340" height="90" rx="12" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="736" y="340" fill="#22c55e" font-size="22" font-family="Inter, Roboto, sans-serif" font-weight="700">Si: agrega test</text>

  <rect x="690" y="470" width="340" height="120" rx="12" fill="#1e293b" stroke="#f7df1e" stroke-width="2"/>
  <text x="725" y="510" fill="#f7df1e" font-size="20" font-family="Inter, Roboto, sans-serif" font-weight="700">Prioridad del siguiente caso</text>
  <text x="725" y="540" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">1) Happy path minimo</text>
  <text x="725" y="565" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">2) Regla de borde relevante</text>

  <path d="M600 220 L340 300" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M600 220 L860 300" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M860 390 L860 470" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>

  <text x="455" y="270" fill="#94a3b8" font-size="14" font-family="Inter, Roboto, sans-serif">No</text>
  <text x="735" y="270" fill="#94a3b8" font-size="14" font-family="Inter, Roboto, sans-serif">Si</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
