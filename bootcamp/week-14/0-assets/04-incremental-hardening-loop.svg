<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#0f172a"/>
  <text x="60" y="76" fill="#f1f5f9" font-size="36" font-family="Inter, Arial, sans-serif" font-weight="700">Loop incremental para endurecer la suite</text>

  <circle cx="600" cy="390" r="230" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>

  <rect x="510" y="170" width="180" height="78" rx="12" fill="#132a1e" stroke="#22c55e"/>
  <text x="542" y="217" fill="#bbf7d0" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">1. Mapear</text>

  <rect x="790" y="330" width="220" height="78" rx="12" fill="#1c2742" stroke="#3572A5"/>
  <text x="824" y="377" fill="#bfdbfe" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">2. Cubrir</text>

  <rect x="510" y="530" width="220" height="78" rx="12" fill="#2b1a1a" stroke="#ef4444"/>
  <text x="546" y="577" fill="#fecaca" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">3. Fortalecer</text>

  <rect x="210" y="330" width="240" height="78" rx="12" fill="#2a2612" stroke="#F7DF1E"/>
  <text x="245" y="377" fill="#fef08a" font-size="22" font-family="Inter, Arial, sans-serif" font-weight="700">4. Automatizar</text>

  <path d="M700 210 C810 230, 860 280, 890 330" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M900 420 C860 500, 790 550, 690 565" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M510 565 C410 550, 330 500, 300 420" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>
  <path d="M300 320 C340 250, 430 210, 510 210" stroke="#94a3b8" stroke-width="4" marker-end="url(#arrow)"/>

  <text x="78" y="700" fill="#cbd5e1" font-size="20" font-family="Inter, Arial, sans-serif">Idea clave: cada ciclo agrega confianza observable sin exigir reescritura total de la suite.</text>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
