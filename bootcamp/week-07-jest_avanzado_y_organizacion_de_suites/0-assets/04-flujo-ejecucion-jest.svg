<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#0f172a"/>
  <text x="600" y="70" fill="#f1f5f9" font-size="34" text-anchor="middle" font-family="Inter, Arial, sans-serif">Flujo de Ejecucion de un Test en Jest</text>

  <rect x="130" y="280" width="200" height="100" rx="10" fill="#1e293b" stroke="#6366f1"/>
  <text x="230" y="338" fill="#f1f5f9" font-size="24" text-anchor="middle" font-family="Inter, Arial, sans-serif">Arrange</text>

  <rect x="390" y="280" width="200" height="100" rx="10" fill="#1e293b" stroke="#F7DF1E"/>
  <text x="490" y="338" fill="#F7DF1E" font-size="24" text-anchor="middle" font-family="Inter, Arial, sans-serif">Act</text>

  <rect x="650" y="280" width="200" height="100" rx="10" fill="#1e293b" stroke="#22c55e"/>
  <text x="750" y="338" fill="#22c55e" font-size="24" text-anchor="middle" font-family="Inter, Arial, sans-serif">Assert</text>

  <rect x="910" y="280" width="200" height="100" rx="10" fill="#1e293b" stroke="#ef4444"/>
  <text x="1010" y="338" fill="#ef4444" font-size="24" text-anchor="middle" font-family="Inter, Arial, sans-serif">Cleanup</text>

  <line x1="330" y1="330" x2="390" y2="330" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="590" y1="330" x2="650" y2="330" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="850" y1="330" x2="910" y2="330" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>

  <text x="600" y="520" fill="#94a3b8" font-size="18" text-anchor="middle" font-family="Inter, Arial, sans-serif">Hooks ayudan a estandarizar Arrange y Cleanup sin ocultar intencion.</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#64748b"/>
    </marker>
  </defs>
</svg>
