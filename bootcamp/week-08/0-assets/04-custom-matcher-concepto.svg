  <line x1="530" y1="330" x2="670" y2="330" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 6 3, 0 6" fill="#64748b"/>
