<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="800" fill="#0f172a"/>
  <text x="56" y="68" fill="#f1f5f9" font-size="34" font-family="Inter, Arial, sans-serif" font-weight="700">Mapa de decision: Mock vs Stub vs Spy</text>
  <text x="56" y="102" fill="#cbd5e1" font-size="20" font-family="Inter, Arial, sans-serif">Selecciona el doble segun objetivo de calidad, no por preferencia de herramienta.</text>

  <rect x="56" y="140" width="1168" height="88" rx="12" fill="#1e293b" stroke="#475569"/>
  <text x="84" y="178" fill="#f8fafc" font-size="23" font-family="Inter, Arial, sans-serif" font-weight="700">Pregunta guia</text>
  <text x="84" y="207" fill="#cbd5e1" font-size="19" font-family="Inter, Arial, sans-serif">¿Necesitas controlar salida, verificar colaboracion o observar comportamiento real?</text>

  <line x1="640" y1="228" x2="640" y2="285" stroke="#64748b" stroke-width="3"/>

  <rect x="80" y="290" width="360" height="420" rx="16" fill="#132a1e" stroke="#22c55e" stroke-width="2"/>
  <text x="108" y="332" fill="#bbf7d0" font-size="30" font-family="Inter, Arial, sans-serif" font-weight="700">STUB</text>
  <text x="108" y="366" fill="#e2e8f0" font-size="19" font-family="Inter, Arial, sans-serif">Objetivo principal:</text>
  <text x="108" y="392" fill="#e2e8f0" font-size="19" font-family="Inter, Arial, sans-serif">controlar datos de retorno.</text>
  <text x="108" y="430" fill="#f1f5f9" font-size="18" font-family="Inter, Arial, sans-serif">Usar cuando:</text>
  <text x="108" y="455" fill="#cbd5e1" font-size="17" font-family="Inter, Arial, sans-serif">- Solo importa resultado funcional</text>
  <text x="108" y="480" fill="#cbd5e1" font-size="17" font-family="Inter, Arial, sans-serif">- No necesitas assert de llamadas</text>
  <text x="108" y="515" fill="#f1f5f9" font-size="18" font-family="Inter, Arial, sans-serif">Riesgo si abusas:</text>
  <text x="108" y="540" fill="#cbd5e1" font-size="17" font-family="Inter, Arial, sans-serif">- Escenarios irreales por datos inventados</text>
  <rect x="108" y="580" width="304" height="100" rx="10" fill="#0f172a" stroke="#22c55e"/>
  <text x="124" y="613" fill="#86efac" font-size="16" font-family="Inter, Arial, sans-serif">Ejemplo:</text>
  <text x="124" y="637" fill="#dcfce7" font-size="15" font-family="Inter, Arial, sans-serif">tax_service.calculate.return_value = 12</text>

  <rect x="460" y="290" width="360" height="420" rx="16" fill="#1c2742" stroke="#3572A5" stroke-width="2"/>
  <text x="488" y="332" fill="#bfdbfe" font-size="30" font-family="Inter, Arial, sans-serif" font-weight="700">MOCK</text>
  <text x="488" y="366" fill="#e2e8f0" font-size="19" font-family="Inter, Arial, sans-serif">Objetivo principal:</text>
  <text x="488" y="392" fill="#e2e8f0" font-size="19" font-family="Inter, Arial, sans-serif">validar interacciones clave.</text>
  <text x="488" y="430" fill="#f1f5f9" font-size="18" font-family="Inter, Arial, sans-serif">Usar cuando:</text>
  <text x="488" y="455" fill="#cbd5e1" font-size="17" font-family="Inter, Arial, sans-serif">- Debes verificar llamadas y argumentos</text>
  <text x="488" y="480" fill="#cbd5e1" font-size="17" font-family="Inter, Arial, sans-serif">- La colaboracion define el resultado</text>
  <text x="488" y="515" fill="#f1f5f9" font-size="18" font-family="Inter, Arial, sans-serif">Riesgo si abusas:</text>
  <text x="488" y="540" fill="#cbd5e1" font-size="17" font-family="Inter, Arial, sans-serif">- Tests fragiles por detalle interno</text>
  <rect x="488" y="580" width="304" height="100" rx="10" fill="#0f172a" stroke="#3572A5"/>
  <text x="504" y="613" fill="#93c5fd" font-size="16" font-family="Inter, Arial, sans-serif">Ejemplo:</text>
  <text x="504" y="637" fill="#dbeafe" font-size="15" font-family="Inter, Arial, sans-serif">gateway.charge.assert_called_once_with(...)</text>

  <rect x="840" y="290" width="360" height="420" rx="16" fill="#2b1a1a" stroke="#ef4444" stroke-width="2"/>
  <text x="868" y="332" fill="#fecaca" font-size="30" font-family="Inter, Arial, sans-serif" font-weight="700">SPY</text>
  <text x="868" y="366" fill="#e2e8f0" font-size="19" font-family="Inter, Arial, sans-serif">Objetivo principal:</text>
  <text x="868" y="392" fill="#e2e8f0" font-size="19" font-family="Inter, Arial, sans-serif">observar metodo real.</text>
  <text x="868" y="430" fill="#f1f5f9" font-size="18" font-family="Inter, Arial, sans-serif">Usar cuando:</text>
  <text x="868" y="455" fill="#cbd5e1" font-size="17" font-family="Inter, Arial, sans-serif">- Quieres telemetria de llamadas</text>
  <text x="868" y="480" fill="#cbd5e1" font-size="17" font-family="Inter, Arial, sans-serif">- Manteniendo ejecucion real</text>
  <text x="868" y="515" fill="#f1f5f9" font-size="18" font-family="Inter, Arial, sans-serif">Riesgo si abusas:</text>
  <text x="868" y="540" fill="#cbd5e1" font-size="17" font-family="Inter, Arial, sans-serif">- Dependencia de efectos secundarios</text>
  <rect x="868" y="580" width="304" height="100" rx="10" fill="#0f172a" stroke="#ef4444"/>
  <text x="884" y="613" fill="#fca5a5" font-size="16" font-family="Inter, Arial, sans-serif">Ejemplo:</text>
  <text x="884" y="637" fill="#fee2e2" font-size="15" font-family="Inter, Arial, sans-serif">spy = mocker.spy(ClassX, "normalize")</text>
</svg>
