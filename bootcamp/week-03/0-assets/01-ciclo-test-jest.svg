<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" width="900" height="500" font-family="system-ui, -apple-system, sans-serif">
  <rect width="900" height="500" fill="#0f172a" rx="12"/>

  <text x="450" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#f1f5f9">Ciclo de Ejecución de un Test en Jest</text>
  <text x="450" y="66" text-anchor="middle" font-size="13" fill="#94a3b8">De la escritura del test al diagnóstico del resultado</text>

  <!-- Nodos -->
  <rect x="60" y="120" width="170" height="70" rx="10" fill="#1e293b" stroke="#F7DF1E" stroke-width="2"/>
  <text x="145" y="146" text-anchor="middle" font-size="13" fill="#F7DF1E" font-weight="700">1. Escribir Test</text>
  <text x="145" y="166" text-anchor="middle" font-size="12" fill="#cbd5e1">describe + it + expect</text>

  <rect x="270" y="120" width="170" height="70" rx="10" fill="#1e293b" stroke="#6366f1" stroke-width="2"/>
  <text x="355" y="146" text-anchor="middle" font-size="13" fill="#6366f1" font-weight="700">2. Ejecutar</text>
  <text x="355" y="166" text-anchor="middle" font-size="12" fill="#cbd5e1">pnpm test</text>

  <rect x="480" y="120" width="170" height="70" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="565" y="146" text-anchor="middle" font-size="13" fill="#22c55e" font-weight="700">3. Analizar</text>
  <text x="565" y="166" text-anchor="middle" font-size="12" fill="#cbd5e1">pass / fail / error</text>

  <rect x="690" y="120" width="150" height="70" rx="10" fill="#1e293b" stroke="#F89820" stroke-width="2"/>
  <text x="765" y="146" text-anchor="middle" font-size="13" fill="#F89820" font-weight="700">4. Ajustar</text>
  <text x="765" y="166" text-anchor="middle" font-size="12" fill="#cbd5e1">código o test</text>

  <!-- Flechas principales -->
  <line x1="230" y1="155" x2="270" y2="155" stroke="#475569" stroke-width="2"/>
  <polygon points="270,155 260,149 260,161" fill="#475569"/>

  <line x1="440" y1="155" x2="480" y2="155" stroke="#475569" stroke-width="2"/>
  <polygon points="480,155 470,149 470,161" fill="#475569"/>

  <line x1="650" y1="155" x2="690" y2="155" stroke="#475569" stroke-width="2"/>
  <polygon points="690,155 680,149 680,161" fill="#475569"/>

  <!-- Retroalimentación -->
  <path d="M765 190 C765 250 355 250 355 190" fill="none" stroke="#ef4444" stroke-width="2"/>
  <polygon points="355,190 365,184 365,196" fill="#ef4444"/>
  <text x="560" y="242" text-anchor="middle" font-size="12" fill="#ef4444">Si falla: corregir y volver a ejecutar</text>

  <!-- Bloques de salida -->
  <rect x="80" y="310" width="230" height="120" rx="10" fill="#1e293b" stroke="#22c55e" stroke-width="2"/>
  <text x="195" y="337" text-anchor="middle" font-size="14" font-weight="700" fill="#22c55e">PASS</text>
  <text x="96" y="360" font-size="12" fill="#e2e8f0">- Test y código alineados</text>
  <text x="96" y="380" font-size="12" fill="#e2e8f0">- Mantener y ampliar cobertura</text>
  <text x="96" y="400" font-size="12" fill="#e2e8f0">- Refactor seguro</text>

  <rect x="335" y="310" width="230" height="120" rx="10" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="450" y="337" text-anchor="middle" font-size="14" font-weight="700" fill="#ef4444">ASSERTION FAILURE</text>
  <text x="351" y="360" font-size="12" fill="#e2e8f0">- Expected != Received</text>
  <text x="351" y="380" font-size="12" fill="#e2e8f0">- Revisar lógica o matcher</text>
  <text x="351" y="400" font-size="12" fill="#e2e8f0">- Validar intención del test</text>

  <rect x="590" y="310" width="230" height="120" rx="10" fill="#1e293b" stroke="#F89820" stroke-width="2"/>
  <text x="705" y="337" text-anchor="middle" font-size="14" font-weight="700" fill="#F89820">RUNTIME ERROR</text>
  <text x="606" y="360" font-size="12" fill="#e2e8f0">- Import/ruta rota</text>
  <text x="606" y="380" font-size="12" fill="#e2e8f0">- undefined/null inesperado</text>
  <text x="606" y="400" font-size="12" fill="#e2e8f0">- setup incompleto</text>

  <text x="450" y="470" text-anchor="middle" font-size="12" fill="#64748b">Semana 03 · Etapa 0 · JavaScript + Jest</text>
</svg>
