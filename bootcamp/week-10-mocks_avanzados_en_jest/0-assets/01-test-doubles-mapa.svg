<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mapa de Test Doubles en Jest</title>
  <desc id="desc">Diagrama que relaciona mock, stub y spy con su objetivo principal en testing.</desc>
  <rect width="1200" height="700" fill="#0f172a"/>
  <rect x="40" y="40" width="1120" height="620" rx="18" fill="#1e293b" stroke="#334155" stroke-width="2"/>

  <text x="80" y="95" fill="#f1f5f9" font-size="34" font-family="Inter, Roboto, sans-serif" font-weight="700">Test Doubles en Jest</text>
  <text x="80" y="130" fill="#94a3b8" font-size="18" font-family="Inter, Roboto, sans-serif">Elegir bien el double mejora aislamiento y legibilidad</text>

  <rect x="80" y="180" width="320" height="420" rx="14" fill="#0b1220" stroke="#6366f1" stroke-width="2"/>
  <text x="110" y="225" fill="#6366f1" font-size="28" font-family="Inter, Roboto, sans-serif" font-weight="700">Mock</text>
  <text x="110" y="260" fill="#cbd5e1" font-size="17" font-family="Inter, Roboto, sans-serif">Reemplaza comportamiento</text>
  <text x="110" y="288" fill="#cbd5e1" font-size="17" font-family="Inter, Roboto, sans-serif">y permite verificar interacciones.</text>
  <text x="110" y="338" fill="#f1f5f9" font-size="16" font-family="Inter, Roboto, sans-serif">Uso:</text>
  <text x="110" y="365" fill="#fbbf24" font-size="15" font-family="monospace">const fn = jest.fn()</text>
  <text x="110" y="420" fill="#f1f5f9" font-size="16" font-family="Inter, Roboto, sans-serif">Valida:</text>
  <text x="110" y="447" fill="#22c55e" font-size="15" font-family="Inter, Roboto, sans-serif">- Cuantas llamadas</text>
  <text x="110" y="472" fill="#22c55e" font-size="15" font-family="Inter, Roboto, sans-serif">- Con que argumentos</text>
  <text x="110" y="497" fill="#22c55e" font-size="15" font-family="Inter, Roboto, sans-serif">- En que orden</text>

  <rect x="440" y="180" width="320" height="420" rx="14" fill="#0b1220" stroke="#22c55e" stroke-width="2"/>
  <text x="470" y="225" fill="#22c55e" font-size="28" font-family="Inter, Roboto, sans-serif" font-weight="700">Stub</text>
  <text x="470" y="260" fill="#cbd5e1" font-size="17" font-family="Inter, Roboto, sans-serif">Entrega respuestas predecibles</text>
  <text x="470" y="288" fill="#cbd5e1" font-size="17" font-family="Inter, Roboto, sans-serif">para controlar escenarios.</text>
  <text x="470" y="338" fill="#f1f5f9" font-size="16" font-family="Inter, Roboto, sans-serif">Uso:</text>
  <text x="470" y="365" fill="#fbbf24" font-size="15" font-family="monospace">fn.mockResolvedValue(data)</text>
  <text x="470" y="420" fill="#f1f5f9" font-size="16" font-family="Inter, Roboto, sans-serif">Ideal para:</text>
  <text x="470" y="447" fill="#22c55e" font-size="15" font-family="Inter, Roboto, sans-serif">- APIs externas</text>
  <text x="470" y="472" fill="#22c55e" font-size="15" font-family="Inter, Roboto, sans-serif">- Repositorios</text>
  <text x="470" y="497" fill="#22c55e" font-size="15" font-family="Inter, Roboto, sans-serif">- Gateways</text>

  <rect x="800" y="180" width="320" height="420" rx="14" fill="#0b1220" stroke="#f7df1e" stroke-width="2"/>
  <text x="830" y="225" fill="#f7df1e" font-size="28" font-family="Inter, Roboto, sans-serif" font-weight="700">Spy</text>
  <text x="830" y="260" fill="#cbd5e1" font-size="17" font-family="Inter, Roboto, sans-serif">Observa una funcion real</text>
  <text x="830" y="288" fill="#cbd5e1" font-size="17" font-family="Inter, Roboto, sans-serif">sin perder su comportamiento base.</text>
  <text x="830" y="338" fill="#f1f5f9" font-size="16" font-family="Inter, Roboto, sans-serif">Uso:</text>
  <text x="830" y="365" fill="#fbbf24" font-size="15" font-family="monospace">jest.spyOn(obj, "method")</text>
  <text x="830" y="420" fill="#f1f5f9" font-size="16" font-family="Inter, Roboto, sans-serif">Cuidado:</text>
  <text x="830" y="447" fill="#ef4444" font-size="15" font-family="Inter, Roboto, sans-serif">- Restaurar con mockRestore()</text>
  <text x="830" y="472" fill="#ef4444" font-size="15" font-family="Inter, Roboto, sans-serif">- Evitar fugas entre tests</text>

  <line x1="400" y1="390" x2="440" y2="390" stroke="#475569" stroke-width="2"/>
  <line x1="760" y1="390" x2="800" y2="390" stroke="#475569" stroke-width="2"/>
</svg>
