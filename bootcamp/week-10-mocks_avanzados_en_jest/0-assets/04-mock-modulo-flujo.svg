<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Flujo de mock de modulo en Jest</title>
  <desc id="desc">Pipeline de importacion con jest.mock para aislar dependencias de infraestructura.</desc>
  <rect width="1200" height="700" fill="#0f172a"/>
  <text x="70" y="85" fill="#f1f5f9" font-size="34" font-family="Inter, Roboto, sans-serif" font-weight="700">Flujo de jest.mock sobre un modulo</text>

  <rect x="70" y="130" width="1060" height="500" rx="18" fill="#1e293b" stroke="#334155" stroke-width="2"/>

  <rect x="120" y="220" width="220" height="280" rx="12" fill="#0b1220" stroke="#6366f1" stroke-width="2"/>
  <text x="145" y="260" fill="#6366f1" font-size="22" font-family="Inter, Roboto, sans-serif" font-weight="700">Test File</text>
  <text x="145" y="295" fill="#fbbf24" font-size="14" font-family="monospace">jest.mock("./gateway")</text>
  <text x="145" y="328" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">Declara reemplazo antes</text>
  <text x="145" y="352" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">de cargar la unidad.</text>

  <rect x="430" y="220" width="220" height="280" rx="12" fill="#0b1220" stroke="#22c55e" stroke-width="2"/>
  <text x="455" y="260" fill="#22c55e" font-size="22" font-family="Inter, Roboto, sans-serif" font-weight="700">Service</text>
  <text x="455" y="295" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">Importa gateway,</text>
  <text x="455" y="320" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">pero recibe version</text>
  <text x="455" y="345" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">mockeada.</text>

  <rect x="740" y="220" width="220" height="280" rx="12" fill="#0b1220" stroke="#f7df1e" stroke-width="2"/>
  <text x="765" y="260" fill="#f7df1e" font-size="22" font-family="Inter, Roboto, sans-serif" font-weight="700">Gateway Mock</text>
  <text x="765" y="295" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">Respuestas controladas</text>
  <text x="765" y="320" fill="#cbd5e1" font-size="15" font-family="Inter, Roboto, sans-serif">sin red ni DB real.</text>

  <path d="M340 360 L430 360" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
  <path d="M650 360 L740 360" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>

  <text x="120" y="560" fill="#94a3b8" font-size="15" font-family="Inter, Roboto, sans-serif">Resultado: tests deterministas, rapidos y centrados en logica de negocio.</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
