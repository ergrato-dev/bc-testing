<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="700" fill="#0f172a"/>
  <text x="600" y="70" fill="#f1f5f9" font-size="34" text-anchor="middle" font-family="Inter, Arial, sans-serif">Flujo de Tests Parametrizados con test.each</text>

  <rect x="120" y="270" width="220" height="110" rx="10" fill="#1e293b" stroke="#6366f1"/>
  <text x="230" y="334" fill="#f1f5f9" font-size="24" text-anchor="middle" font-family="Inter, Arial, sans-serif">Tabla de casos</text>

  <rect x="390" y="270" width="220" height="110" rx="10" fill="#1e293b" stroke="#F7DF1E"/>
  <text x="500" y="334" fill="#F7DF1E" font-size="24" text-anchor="middle" font-family="Inter, Arial, sans-serif">Iteracion</text>

  <rect x="660" y="270" width="220" height="110" rx="10" fill="#1e293b" stroke="#22c55e"/>
  <text x="770" y="334" fill="#22c55e" font-size="24" text-anchor="middle" font-family="Inter, Arial, sans-serif">Assertion</text>

  <rect x="930" y="270" width="180" height="110" rx="10" fill="#1e293b" stroke="#ef4444"/>
