  <line x1="340" y1="325" x2="390" y2="325" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="610" y1="325" x2="660" y2="325" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>
  <line x1="880" y1="325" x2="930" y2="325" stroke="#64748b" stroke-width="3" marker-end="url(#arr)"/>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
